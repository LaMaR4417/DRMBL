<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Game - DRMBL</title>
    <link rel="icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="css/skeleton.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/live-game.css">
    <script src="js/skeleton.js"></script>
</head>
<body>

    <!-- No-game state (shown by default) -->
    <section id="no-game" class="live-no-game">
        <div class="live-no-game-content">
            <h1 class="live-no-game-title">Live Game</h1>
            <p>No game is currently in progress.</p>
            <p class="live-no-game-sub">This page automatically updates when a game starts.</p>
        </div>
    </section>

    <!-- Game selector (hidden when 0-1 games) -->
    <div id="game-selector" class="game-selector hidden"></div>

    <!-- Live game content (hidden by default) -->
    <section id="live-game" class="live-game-section hidden">

        <!-- Status header banner -->
        <div id="live-header" class="live-header in-progress">
            <span id="live-header-label" class="live-header-label">LIVE</span>
            <span id="live-header-sub" class="live-header-sub"></span>
        </div>

        <!-- Scoreboard -->
        <div class="live-scoreboard">
            <div class="live-score-row">
                <div class="live-team-side home">
                    <span class="live-team-name" id="home-name">HOME</span>
                    <span class="live-team-score" id="home-score">0</span>
                </div>
                <div class="live-clock-inline">
                    <span class="live-league-badge" id="live-league-badge"></span>
                    <span class="live-quarter" id="live-quarter">Q1</span>
                    <span class="live-clock" id="live-clock">10:00</span>
                </div>
                <div class="live-team-side away">
                    <span class="live-team-score" id="away-score">0</span>
                    <span class="live-team-name" id="away-name">AWAY</span>
                </div>
            </div>
        </div>

        <!-- Body: two independent columns (left: period scores + team stats, right: away + home box scores) -->
        <div class="live-body">
            <div class="live-col live-col-left">
                <div class="live-section">
                    <div class="live-section-title">SCORING BY PERIOD</div>
                    <div id="quarter-scores"></div>
                </div>
                <div class="live-section">
                    <div class="live-section-title">TEAM STATS</div>
                    <div id="team-stats"></div>
                </div>
            </div>
            <div class="live-col live-col-right">
                <div class="live-section" id="away-player-stats"></div>
                <div class="live-section" id="home-player-stats"></div>
            </div>
        </div>
    </section>

    <!-- Last updated indicator -->
    <div id="last-updated" class="live-last-updated hidden"></div>

    <footer>
        &copy; 2026 Del Rio Men's Basketball League
    </footer>

    <script src="js/live-game.js"></script>
</body>
</html>
